    <p id="scatter-why" class="why-text"></p>

  </div>
  <aside id="cluster-side-panel" class="panel-side card hidden">
    <button type="button" id="close-cluster-panel" class="icon-btn" aria-label="Close">×</button>

    <h4>Lifecycle meaning</h4>
